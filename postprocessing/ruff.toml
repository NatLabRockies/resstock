# https://docs.astral.sh/ruff/settings/
fix = true
line-length = 120

# https://docs.astral.sh/ruff/settings/#format
[format]
docstring-code-format = true

# https://docs.astral.sh/ruff/linter/#rule-selection
[lint]
# Enable these rules
extend-select = [
    "A",   # flake8-builtins
    "ARG", # flake8-unused-arguments
    "BLE", # flake8-blind-except
    "C4",  # flake8-comprehensions
    "COM", # flake8-commas
    # "DTZ", # flake8-datetimez
    "E",   # Error
    "EXE", # flake8-executable
    "F",   # Pyflakes
    "I",   # isort
    "ICN", # flake8-import-conventions
    "ISC", # flake8-implicit-str-concat
    "N",   # pep8-naming
    "NPY", # NumPy
    "PD",  # pandas-vet
    "PGH", # pygrep-hooks
    "PIE", # flake8-pie
    "PLC", # Pylint Convention
    "PLE", # Pylint Error
    "PLR", # Pylint Refactor
    "PLW", # Pylint Warning
    "PT",  # flake8-pytest-style
    "Q",   # flake8-quotes
    "RUF", # Ruff-specific rules
    "S",   # flake8-bandit
    "SIM", # flake8-simplify
    "T10", # flake8-debugger
    "TID", # flake8-tidy-imports
    "UP",  # pyupgrade
]
# except for these specific errors
# Ruff has a list of linting rules to ignore when using the Ruff formatter (as we are): https://docs.astral.sh/ruff/formatter/#conflicting-lint-rules
ignore = [
    "COM812",  # missing-trailing-comma
    "PLR0911", # too-many-return-statements
    "PLR0912", # too-many-branches
    "PLR0913", # too-many-arguments
    "PLR0915", # too-many-statements
    "PD901", # df for variable assignment is our convention in polars code
    "PGH003", # Use specific rule codes when ignoring type issues instead of type: ignore
    "I001", # isort
    "TID252", # relative imports are used in the dashboard to keep things simple
    "BLE001", # blind excepts are sometimes acceptable to make the dashboard robust
    "PLR2004", # magic value comparison okay for now - consider changing later
    "S101", # assert statements acceptable
    "RUF005", # my_list + [item] is fine; don't need [*my_list, item]
]

[lint.flake8-tidy-imports]
ban-relative-imports = "all"

[lint.per-file-ignores]
"**/__init__.py" = [
    "F401", # unused-import
    "F403", # undefined-local-with-import-star
]
"**/tests/*" = [
    "N806",    # non-lowercase-variable-in-function
    "PLR2004", # magic-value-comparison
    "PT009",   # pytest-unittest-assertion
    "S101",    # assert
]
# Files dominated by HTML/JS template strings where wrapping a line would
# change the emitted dashboard output. Short lines checked by eye.
"**/baseline_validation/io_managers/data_table.py" = ["E501"]
"**/baseline_validation/create_html_viewer.py" = ["E501"]
"**/baseline_validation/io_managers/html_utils.py" = ["E501"]
