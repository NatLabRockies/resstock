# Baseline Validation Workflow Configuration
# ===========================================
# This file defines the configuration for baseline validation plots

# BuildStock Data Source
# ----------------------
workgroup: rescore

data_sources:
  # - db_name: buildstock_sdr
  #   table_name: resstock_2024_amy2018_release_2
  #   name: resstock_2024
  #   db_schema: resstock_oedi_vu
  - db_name: buildstock_sdr
    table_name: resstock_amy2018_r1_2025
    name: resstock_2025
    db_schema: resstock_oedi_new



reference_years:
  eia:
    - 2018
    # - 2020
  recs:
    - 2020

plots:
  plot_types:
    - recs

  aggregation_levels:
    - state
    - eiaid

  output_formats:
    - html
    - csv
    # - svg
    # - parquet

  # Cross-filter expansion for RECS annual plots is now automatic.
  # All valid (filter, sub-filter, group-by) combinations are generated
  # from the eligible characteristics per source/resolution.

# Quantities to Generate
# ----------------------
# List of quantities to generate comparison plots for.
# If empty or not specified, all quantities will be generated.
# To generate plots for only a subset of quantities, list them here.
quantities:
  - All Enduses
  - Number of dwelling units
  - Electricity Total
  - Natural Gas Total
  - Electricity Space Cooling
  - Electricity Space Heating
  - Electricity Water Heating
  - Natural Gas Space Heating
  - Natural Gas Water Heating
  - Electricity Plug Load
  - Electricity Refrigerator
  - Electricity Lighting
  - Electricity Television
  - Electricity Clothes Dryer
  - Electricity Cooling Fan Pumps
  - Electricity Heating Fans Pumps
  - Electricity Freezer
  - Electricity Cooking
  - Electricity Pool Pumps
  - Electricity Ceiling Fan
  - Electricity Dishwasher
  - Electricity Clothes Washer
  - Electricity Pool Heater
  - Electricity EV Charging
  - Natural Gas Cooking
  - Natural Gas Pool Heater
  - Natural Gas Clothes Dryer
  - Propane Total
  - Propane Space Heating
  - Propane Water Heating
  - Propane Cooking
  - Propane Clothes Dryer
  - Fuel Oil Total
  - Fuel Oil Space Heating
  - Fuel Oil Water Heating

# Output Configuration
# --------------------
output:
  output_dir: /Users/radhikar/Documents/buildstock2025/baseline_validation_output/
  run_name: baseline_val7

# Data Source Labels
# ------------------
# Human-readable labels for data sources appearing in plot legends.
# Keys must match the 'source' column values in plot data (e.g. eia_2018, resstock_2025).
data_source_labels:
  eia_2018:
    label: "EIA 2018"
    entries:
      - description: "EIA-861 Annual Electric Utility Data (2018)"
        url: "https://www.eia.gov/electricity/data/eia861/"
      - description: "EIA-861M Monthly Electric Power Industry Report (2018)"
        url: "https://www.eia.gov/electricity/data/eia861m/"
      - description: "EIA-176 Natural Gas Consumption Data (2018)"
        url: "https://www.eia.gov/dnav/ng/ng_cons_sum_a_EPG0_vrs_mmcf_m.htm"
  recs_2020:
    label: "RECS 2020"
    entries:
      - description: "Residential Energy Consumption Survey 2020"
        url: "https://www.eia.gov/consumption/residential/"
  resstock_2025:
    label: "ResStock 2025"
    entries:
      - description: "ResStock Standard Data Release 2025 Release 1"
        url: "https://resstock.nrel.gov/"
  lrd_2018:
    label: "LRD 2018"
    entries:
      - description: "Utility Load Research Data 2018"
