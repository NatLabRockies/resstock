# Cascading plot footnotes
# ========================
# Each entry specifies attribute matchers and a note.
# A note applies when ALL specified attributes match the plot's TSV row values.
# Multiple matching notes accumulate in order.
#
# Supported matcher keys (single string or list of strings — any-of):
#   comparison_dataset — "eia", "recs", or "lrd"
#   quantity      — e.g. "Number of dwelling units", "Natural Gas Total"
#   metric        — e.g. "enduse penetration", "total annual consumption"
#   coverage      — e.g. "all units", "units with non-zero consumption"
#
# Optional context key restricts when a note is shown:
#   context: plot   — only shown on plot pages (not data tables)
#   context: table  — only shown on data table pages (not plots)
#   (omitted)       — shown on both plots and data tables
#
# Optional exclude key skips the note when any excluded value matches:
#   exclude:
#     quantity: Number of dwelling units          # single value
#     metric:                                     # or a list of values
#       - Distribution of Consumption per Dwelling Unit
#       - Distribution of Consumption per Consuming Dwelling Unit
#
# Omitted matcher keys act as wildcards (match anything).

notes:
  - comparison_dataset: recs
    note: >
      Only occupied dwelling units are included in the comparison.

  - comparison_dataset: recs
    context: plot
    exclude:
      quantity: Number of dwelling units
      metric:
        - Distribution of Consumption per Dwelling Unit
        - Distribution of Consumption per Consuming Dwelling Unit
        - Monthly Consumption
        - Average Monthly Consumption per Dwelling Unit
        - Average Monthly Consumption per Consuming Dwelling Unit
    note: >
      Error bars represent the 95% confidence interval based on
      RECS relative standard error (RSE) estimates.

  - comparison_dataset: recs
    context: plot
    metric:
      - Monthly Consumption
      - Average Monthly Consumption per Dwelling Unit
      - Average Monthly Consumption per Consuming Dwelling Unit
    note: >
      The darker filled area represents RECS consumption (from the lower
      confidence bound to zero). The lighter band above it shows the 95%
      confidence interval based on RECS relative standard error (RSE)
      estimates.

  - comparison_dataset: recs
    quantity: Number of dwelling units
    context: plot
    note: >
      ResStock dwelling unit counts represent the number of dwelling units
      captured through the combination of models and sampling weights.
      On hover, the RECS reference bar shows number of samples and the
      ResStock bar shows number of models.

  - comparison_dataset: eia
    quantity: Natural Gas Total
    metric: enduse penetration
    note: >
      The share of dwelling units with natural gas is calculated for EIA
      by dividing the natural gas customer count by the electricity customer
      count. For ResStock, it is the percent of models that have non-zero
      natural gas consumption.
