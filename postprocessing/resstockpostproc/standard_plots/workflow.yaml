# yaml-language-server: $schema=./schema/workflow_schema.json

# results_csvs_folder: /Users/radhikar/Documents/buildstock2025/resstock2025/test/base_results/upgrades/sdr_annual
annual_results_dir: /Users/radhikar/Documents/buildstock2025/resstock_amy2018_release_2/parquet
output_dir: /Users/radhikar/Documents/buildstock2025/resstock_amy2018_release_2/plots
upgrades: [0, 1] # corresponds to results_up00.csv, results_up01.csv, results_up02.csv
quantities:
  - name: energy_consumption
    constituents:
      - out.electricity.total.energy_consumption.kwh
      - out.natural_gas.total.energy_consumption.kwh
      - out.propane.total.energy_consumption.kwh
      - out.fuel_oil.total.energy_consumption.kwh
    sum: out.site_energy.total.energy_consumption.kwh
  - name: bills
    constituents:
      - out.bills.electricity.usd
      - out.bills.natural_gas.usd
      - out.bills.propane.usd
    sum: out.bills.all_fuels.usd
  - name: unmet_hours
    constituents:
      - out.unmet_hours.cooling.hour
      - out.unmet_hours.heating.hour
  - name: mid_case_emissions
    constituents:
      - out.emissions.electricity.lrmer_mid_case_25.co2e_kg
      - out.emissions.natural_gas.lrmer_mid_case_25.co2e_kg
      - out.emissions.propane.lrmer_mid_case_25.co2e_kg
      - out.emissions.fuel_oil.lrmer_mid_case_25.co2e_kg
    sum: out.emissions.all_fuels.lrmer_mid_case_25.co2e_kg
visualization_types:
  - bar
  - box
group_by:
  - in.census_division
  - in.vintage
  - in.geometry_building_type_recs
  - in.heating_fuel
  - in.vacancy_status
comparison_types:
  - absolute
  - savings
  # - percent_savings
upgrade_inclusion:
  - all
  - applied_only
vacancy_inclusion:
  - all
  - occupied_only
