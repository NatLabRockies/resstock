files: ^postprocessing/resstockpostproc/.*\.py$
repos:
  - repo: https://github.com/crate-ci/typos
    rev: v1.34.0
    hooks:
      - id: typos
        exclude: '\.(csv|geojson|json|ipynb)$'
        args: [] # Disable writing changes
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=5000"]
      - id: check-ast
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-executables-have-shebangs
      - id: check-illegal-windows-names
      - id: check-json
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: debug-statements
      - id: detect-private-key
      - id: end-of-file-fixer
        exclude: postprocessing/resstockpostproc/upgrade_comparison/schema/workflow_schema.json # Exclude the generated schema
      - id: fix-byte-order-marker
      - id: mixed-line-ending
      # - id: name-tests-test
      #   args: ["--pytest-test-first"]
      - id: trailing-whitespace
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [markdown, toml, yaml]
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.17.0
    hooks:
      - id: mypy
        name: mypy
        entry: uv run --directory=postprocessing/ -m mypy
        language: system
        types: [python]
        always_run: true
        args:
          [
            "--config-file=pyproject.toml",
            "--python-version=3.11",
            "resstockpostproc/upgrade_comparison/",
          ]
        pass_filenames: false
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.4
    hooks:
      # Run the linter
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix, --output-format=full]
      # Run the formatter
      - id: ruff-format
  - repo: local
    hooks:
      - id: pydantic-schema
        name: Generate JSON Schema from models
        language: system
        entry: uv --directory=postprocessing run -v resstockpostproc/upgrade_comparison/schema/generate_workflow_schema.py
        # Only run when model files change; adjust to match your package path.
        files: postprocessing/resstockpostproc/upgrade_comparison/schema/workflow_schema.py
        pass_filenames: false
