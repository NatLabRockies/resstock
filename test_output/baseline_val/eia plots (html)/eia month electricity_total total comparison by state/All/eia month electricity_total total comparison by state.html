          Plotly.downloadImage(gd, {format: 'png', filename: 'plot', width: gd.offsetWidth, height: gd.offsetHeight, scale: 2});
        }
      },
      {
        name: 'Download SVG',
        icon: icon,
        click: function(gd) {
          Plotly.downloadImage(gd, {format: 'svg', filename: 'plot', width: gd.offsetWidth, height: gd.offsetHeight});
        }
      }
    ]
  }));
})();
</script>
</body>
