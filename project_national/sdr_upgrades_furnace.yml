schema_version: '0.6'
os_version: 3.9.0
os_sha: c77fbb9569
buildstock_directory: ../ # Relative to this file or absolute
project_directory: project_national # Relative to buildstock_directory
output_directory: sdr_upgrades_furn_v3
weather_files_url: https://data.nrel.gov/system/files/156/Buildstock_TMY3_FIPS-1678817889.zip
# weather_files_path: c:/OpenStudio/BuildStock_TMY3_FIPS.zip # Local weather files example
# weather_files_path: /kfs2/shared-projects/buildstock/weather/BuildStock_TMY3_FIPS.zip # Kestrel TMY3 weather files
# weather_files_path: /kfs2/shared-projects/buildstock/weather/BuildStock_2018_FIPS.zip # Kestrel 2018 weather files

# Baseline number of units
baseline:
  n_buildings_represented: 139647020 # American Community Survey 2021 5-year, B25001, does not include territories

# Sampler type and number of data points per baseline or upgrade
sampler:
  # type: precomputed
  type: residential_quota # For production run
  args:
    # sample_file: resources/buildstock_furnace_streamlined.csv # For CI
    n_datapoints: 1000 # For production run

# NREL High Performance Computing machine configuration
# Not used if running buildstock_local (local tests and CI)
kestrel:
  n_jobs: 600
  minutes_per_sim: 10
  account: <account>
  postprocessing:
    time: 800
    n_workers: 20
    n_procs: 20
  sampling:
    time: 60

# Post proccessing and Amazon Web Services
postprocessing:
  # Post simulation partitioning
  keep_individual_timeseries: true
  partition_columns:
    - State
    - County
  publish_annual_results: true
  # AWS upload bucket and athena setup (uncomment during production and testing runs)
  # aws:
  #  region_name: us-west-2
  #  s3:
  #    bucket: sdr_resstock
  #    prefix: production_runs
  #  athena:
  #    glue_service_role: service-role/AWSGlueServiceRole-default
  #    database_name: sdr_resstock
  #    max_crawling_time: 1200

# Workflow generator
workflow_generator:
  # ResStock HPXML workflow generator
  type: residential_hpxml
  version: 2025.04.29

  args:
    # Annual simulation and timestep
    build_existing_model:
      simulation_control_timestep: 15
      simulation_control_run_period_begin_month: 1
      simulation_control_run_period_begin_day_of_month: 1
      simulation_control_run_period_end_month: 12
      simulation_control_run_period_end_day_of_month: 31
      simulation_control_run_period_calendar_year: 2018

    # Emissions scenarios
    emissions:
      - scenario_name: LRMER_LowRECost_15
        type: CO2e
        elec_folder: data/emissions/cambium/2022/LRMER_LowRECost_15
      - scenario_name: LRMER_MidCase_15
        type: CO2e
        elec_folder: data/emissions/cambium/2022/LRMER_MidCase_15
      - scenario_name: LRMER_HighRECost_15
        type: CO2e
        elec_folder: data/emissions/cambium/2022/LRMER_HighRECost_15
      - scenario_name: LRMER_MidCase_25
        type: CO2e
        elec_folder: data/emissions/cambium/2022/LRMER_MidCase_25

    # Utility bill rates
    utility_bills:
      - scenario_name: Utility Rates - Fixed + Variable
        simple_filepath: data/utility_bills/sdr_rates/State.tsv

    # Outputs to include
    simulation_output_report:
      timeseries_frequency: timestep
      include_timeseries_total_consumptions: true
      include_timeseries_fuel_consumptions: true
      include_timeseries_end_use_consumptions: true
      include_timeseries_emissions: true
      include_timeseries_emission_fuels: true
      include_timeseries_emission_end_uses: false
      include_timeseries_hot_water_uses: true
      include_timeseries_total_loads: true
      include_timeseries_component_loads: true
      include_timeseries_unmet_hours: true
      include_timeseries_zone_temperatures: true
      include_timeseries_zone_conditions: true
      include_timeseries_airflows: true
      include_timeseries_weather: true
      include_timeseries_resilience: true
      output_variables:
        - name: People Sensible Heating Rate
        - name: People Total Heating Rate
        - name: Site Outdoor Air Humidity Ratio

    # Other reporting measures to run
    reporting_measures:
      - measure_dir_name: QOIReport
      - measure_dir_name: ServerDirectoryCleanup # tack this on so we can save some disk space (when using debug: true)

    # Files to keep
    server_directory_cleanup:
      retain_in_idf: true
      retain_schedules_csv: true
      retain_in_osm: true

    debug: true



upgrades:
  - upgrade_name: 95% AFUE gas furnace for all
    
    package_apply_logic: &remove_high_rise_shared
      - not: Heating Fuel|Wood 
      - not: Heating Fuel|Other Fuel
      - not: Heating Fuel|None
      - not:
        - or:
          - HVAC Shared Efficiencies|Boiler Baseboards Heating Only, Electricity
          - HVAC Shared Efficiencies|Boiler Baseboards Heating Only, Fuel
          - HVAC Shared Efficiencies|Fan Coil Heating and Cooling, Electricity
          - HVAC Shared Efficiencies|Fan Coil Heating and Cooling, Fuel
          - HVAC Shared Efficiencies|Fan Coil Cooling Only 
        - and:
          - Geometry Building Type Height|Multi-Family with 5+ Units, 8+ Stories

    options:
        ### -- Natural Gas Furnace AFUE 95% applies to all dwellings with ducts
      - &ducted_ng_furnace
        option: HVAC Heating Efficiency|Fuel Furnace, 96% AFUE # TODO: change in options_lookup.csv
        apply_logic: &ducted_ng_furnace_apply_logic
          - HVAC Has Ducts|Yes 
          - not:
            - or:
              - HVAC Shared Efficiencies|Boiler Baseboards Heating Only, Electricity
              - HVAC Shared Efficiencies|Boiler Baseboards Heating Only, Fuel
              - HVAC Shared Efficiencies|Fan Coil Heating and Cooling, Electricity
              - HVAC Shared Efficiencies|Fan Coil Heating and Cooling, Fuel
              - HVAC Shared Efficiencies|Fan Coil Cooling Only 
        lifetime: &lifetime_ducted_ng_furnace 15 # 15 - 20 yrs, replacement at 15 normal
      
      - &change_to_ng  
        option: HVAC Heating Type And Fuel|Natural Gas Fuel Furnace
        apply_logic: 
          - not: Heating Fuel|Natural Gas
          # TODO: check that this is getting applied right, seems too simple

  - upgrade_name: propane + fuel oil furnace
    package_apply_logic: *remove_high_rise_shared
    options:
      - &ducted_prop_furnace
        option: HVAC Heating Efficiency|Fuel Furnace, 96% AFUE
        apply_logic: &ducted_prop_furnace_apply_logic
          - HVAC Has Ducts|Yes
          - Heating Fuel|Propane
        lifetime: 15
      - &ducted_fo_furnace
        option: HVAC Heating Efficiency|Fuel Furnace, 85% AFUE #TODO: need to add in 88% AFUE
        apply_logic: &ducted_fo_furnace_apply_logic
          - HVAC Has Ducts|Yes
          - Heating Fuel|Fuel Oil
        lifetime: 15

  - upgrade_name: reference case
    # Only ducted homes, no high-rise/shared
    package_apply_logic: &exclusion_ref
      - *remove_high_rise_shared
      - HVAC Has Ducts|Yes

    options:
      # ———————————————————————————————
      # Natural‐gas furnace
      # ———————————————————————————————
      # Upgrade low-efficiency (<80%) to 80% AFUE
      - option: HVAC Heating Efficiency|Fuel Furnace, 80% AFUE
        apply_logic:
          - *exclusion_ref
          - Heating Fuel|Natural Gas
          - or:
            - HVAC Heating Efficiency|Fuel Furnace, 60% AFUE
            - HVAC Heating Efficiency|Fuel Furnace, 68% AFUE
            - HVAC Heating Efficiency|Fuel Furnace, 72% AFUE
            - HVAC Heating Efficiency|Fuel Furnace, 76% AFUE
            - HVAC Heating Efficiency|Fuel Furnace, 80% AFUE
        lifetime: 15

      # Like-for-like replacements (>=80% keep their existing AFUE)
      - option: HVAC Heating Efficiency|Fuel Furnace, 85% AFUE
        apply_logic:
          - *exclusion_ref
          - Heating Fuel|Natural Gas
          - HVAC Heating Efficiency|Fuel Furnace, 85% AFUE
        lifetime: 15

      - option: HVAC Heating Efficiency|Fuel Furnace, 90% AFUE
        apply_logic:
          - *exclusion_ref
          - Heating Fuel|Natural Gas
          - HVAC Heating Efficiency|Fuel Furnace, 90% AFUE
        lifetime: 15

      - option: HVAC Heating Efficiency|Fuel Furnace, 92.5% AFUE
        apply_logic:
          - *exclusion_ref
          - Heating Fuel|Natural Gas
          - HVAC Heating Efficiency|Fuel Furnace, 92.5% AFUE
        lifetime: 15

      - option: HVAC Heating Efficiency|Fuel Furnace, 95% AFUE
        apply_logic:
          - *exclusion_ref
          - Heating Fuel|Natural Gas
          - HVAC Heating Efficiency|Fuel Furnace, 95% AFUE
        lifetime: 15

      - option: HVAC Heating Efficiency|Fuel Furnace, 96% AFUE
        apply_logic:
          - *exclusion_ref
          - Heating Fuel|Natural Gas
          - HVAC Heating Efficiency|Fuel Furnace, 96% AFUE
        lifetime: 15


      # ——————————————————————————————
      # Propane like-for-like replacements (>80% AFUE)
      # ——————————————————————————————
      # Upgrade low-efficiency (<80%) to 80% AFUE
      - option: HVAC Heating Efficiency|Fuel Furnace, 80% AFUE
        apply_logic:
          - *exclusion_ref
          - Heating Fuel|Propane
          - or:
            - HVAC Heating Efficiency|Fuel Furnace, 60% AFUE
            - HVAC Heating Efficiency|Fuel Furnace, 68% AFUE
            - HVAC Heating Efficiency|Fuel Furnace, 72% AFUE
            - HVAC Heating Efficiency|Fuel Furnace, 76% AFUE
            - HVAC Heating Efficiency|Fuel Furnace, 80% AFUE
        lifetime: 15

      - option: HVAC Heating Efficiency|Fuel Furnace, 85% AFUE
        apply_logic:
          - *exclusion_ref
          - Heating Fuel|Propane
          - HVAC Heating Efficiency|Fuel Furnace, 85% AFUE
        lifetime: 15

      - option: HVAC Heating Efficiency|Fuel Furnace, 90% AFUE
        apply_logic:
          - *exclusion_ref
          - Heating Fuel|Propane
          - HVAC Heating Efficiency|Fuel Furnace, 90% AFUE
        lifetime: 15

      - option: HVAC Heating Efficiency|Fuel Furnace, 92.5% AFUE
        apply_logic:
          - *exclusion_ref
          - Heating Fuel|Propane
          - HVAC Heating Efficiency|Fuel Furnace, 92.5% AFUE
        lifetime: 15

      - option: HVAC Heating Efficiency|Fuel Furnace, 96% AFUE
        apply_logic:
          - *exclusion_ref
          - Heating Fuel|Propane
          - HVAC Heating Efficiency|Fuel Furnace, 96% AFUE
        lifetime: 15


      # ———————————————————————————————
      # 3) Fuel-oil furnace (85% threshold) # needs to be 83% AFUE!
      # ———————————————————————————————
      # Upgrade low-efficiency (<80%) to 80% AFUE
      - option: HVAC Heating Efficiency|Fuel Furnace, 80% AFUE
        apply_logic:
          - *exclusion_ref
          - Heating Fuel|Fuel Oil
          - or:
            - HVAC Heating Efficiency|Fuel Furnace, 60% AFUE
            - HVAC Heating Efficiency|Fuel Furnace, 68% AFUE
            - HVAC Heating Efficiency|Fuel Furnace, 72% AFUE
            - HVAC Heating Efficiency|Fuel Furnace, 76% AFUE
            - HVAC Heating Efficiency|Fuel Furnace, 80% AFUE
        lifetime: 15

      - option: HVAC Heating Efficiency|Fuel Furnace, 85% AFUE # TODO: Needs to be 83% in options look up
        apply_logic:
          - *exclusion_ref
          - Heating Fuel|Fuel Oil
          - or:
            - HVAC Heating Efficiency|Fuel Furnace, 60% AFUE
            - HVAC Heating Efficiency|Fuel Furnace, 68% AFUE
            - HVAC Heating Efficiency|Fuel Furnace, 72% AFUE
            - HVAC Heating Efficiency|Fuel Furnace, 76% AFUE
            - HVAC Heating Efficiency|Fuel Furnace, 80% AFUE
        lifetime: 15

      - option: HVAC Heating Efficiency|Fuel Furnace, 90% AFUE
        apply_logic:
          - *exclusion_ref
          - Heating Fuel|Fuel Oil
          - HVAC Heating Efficiency|Fuel Furnace, 90% AFUE
        lifetime: 15
      
      - option: HVAC Heating Efficiency|Fuel Furnace, 92.5% AFUE
        apply_logic:
          - *exclusion_ref
          - Heating Fuel|Fuel Oil
          - HVAC Heating Efficiency|Fuel Furnace, 92.5% AFUE
        lifetime: 15
      
      - option: HVAC Heating Efficiency|Fuel Furnace, 96% AFUE
        apply_logic:
          - *exclusion_ref
          - Heating Fuel|Fuel Oil
          - HVAC Heating Efficiency|Fuel Furnace, 96% AFUE
        lifetime: 15
      

      # ———————————————————————————————
      # 4) Central AC — SEER 14.3 for Southeast and Southwest only
      # ———————————————————————————————
      - option: HVAC Cooling Efficiency|AC, SEER2 14.3 
        apply_logic:
          - *exclusion_ref
          - and:
            - or:
                - State|AL
                - State|AR
                - State|DE
                - State|FL
                - State|GA
                - State|HI
                - State|KY
                - State|LA
                - State|MD
                - State|MS
                - State|NC
                - State|OK
                - State|SC
                - State|TN
                - State|TX
                - State|VA
                - State|DC
                - State|AZ
                - State|CA
                - State|NV
                - State|NM
                # Optional additions:
                # - State|PR
                # - State|AS
                # - State|GU
                # - State|MP
                # - State|VI
          - or:
              - HVAC Cooling Efficiency|AC, SEER 8
              - HVAC Cooling Efficiency|AC, SEER 10
              - HVAC Cooling Efficiency|AC, SEER 13
              - HVAC Cooling Efficiency|AC, SEER 14
        lifetime: 16

      # TODO: Technically this should be SEER2
      # ———————————————————————————————
      # All other states — SEER 13.4
      # ———————————————————————————————
      - option: HVAC Cooling Efficiency|AC, SEER2 13.4
        apply_logic:
          - *exclusion_ref
          - not:
              - or:
                  - State|AL
                  - State|AR
                  - State|DE
                  - State|FL
                  - State|GA
                  - State|HI
                  - State|KY
                  - State|LA
                  - State|MD
                  - State|MS
                  - State|NC
                  - State|OK
                  - State|SC
                  - State|TN
                  - State|TX
                  - State|VA
                  - State|DC
                  - State|AZ
                  - State|CA
                  - State|NV
                  - State|NM
          - or:
              - HVAC Cooling Efficiency|AC, SEER 8
              - HVAC Cooling Efficiency|AC, SEER 10
              - HVAC Cooling Efficiency|AC, SEER 13
        lifetime: 16
      
      
      # Questions: do we want to do Room ACs? ASHPs? Does that make sense for the reference case?