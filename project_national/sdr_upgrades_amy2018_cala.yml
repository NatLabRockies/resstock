schema_version: '0.6'
os_version: 3.9.0 # 3.10.0
os_sha: c77fbb9569 # 86d7e215a1
buildstock_directory: ../ # Relative to this file or absolute
project_directory: project_national # Relative to buildstock_directory
output_directory: /kfs2/projects/panels/2026_cala_rnd100/sdr_2025_amy2018_50k_sfd_occupied/
# weather_files_url: https://data.nrel.gov/system/files/156/Buildstock_TMY3_FIPS-1678817889.zip
# weather_files_path: /Users/lliu2/Documents/buildstock/BuildStock_2018_FIPS.zip # Local weather files example
# weather_files_path: /kfs2/shared-projects/buildstock/weather/BuildStock_TMY3_FIPS.zip # Kestrel TMY3 weather files
weather_files_path: /kfs2/shared-projects/buildstock/weather/BuildStock_2018_FIPS.zip # Kestrel 2018 weather files

# Baseline number of units
baseline:
  n_buildings_represented: 139647020 # American Community Survey 2021 5-year, B25001, does not include territories
  skip_sims: true

# Sampler type and number of data points per baseline or upgrade
sampler:
  type: precomputed
  # type: residential_quota_downselect # For production run
  args:
    sample_file: resources/buildstock_cala.csv # produced using logic below
    # n_datapoints: 50000 # For production run
    # logic:
    #   - Geometry Building Type RECS|Single-Family Detached
    #   - Vacancy Status|Occupied
    # resample: true


# NLR High Performance Computing machine configuration
# Not used if running buildstock_local (local tests and CI)
kestrel:
  n_jobs: 5
  minutes_per_sim: 4
  account: panels
  postprocessing:
    time: 180
    n_workers: 6
    n_procs: 2
  sampling:
    time: 30

# Timeout to avoid whole-job failures from long-running models
max_minutes_per_sim: 5

# Post processing and Amazon Web Services
postprocessing:
  # Post simulation partitioning
  keep_individual_timeseries: true
  partition_columns:
    - State
    - County
  publish_annual_results: false
  # AWS upload bucket and athena setup (uncomment during production and testing runs)
  aws:
   region_name: us-west-2
   s3:
     bucket: resstock-panels
     prefix: cala_rnd100
  #  athena:
  #    glue_service_role: service-role/AWSGlueServiceRole-default
  #    database_name: resstock_core
  #    max_crawling_time: 1200

# Workflow generator
workflow_generator:
  # ResStock HPXML workflow generator
  type: residential_hpxml
  version: 2025.04.29 # 2025.12.03

  args:
    # Annual simulation and timestep
    build_existing_model:
      simulation_control_timestep: 1
      simulation_control_run_period_begin_month: 1
      simulation_control_run_period_begin_day_of_month: 1
      simulation_control_run_period_end_month: 12
      simulation_control_run_period_end_day_of_month: 31
      simulation_control_run_period_calendar_year: 2018
      add_component_loads: true

    # Utility bill rates
    utility_bills:
      - scenario_name: Utility Rates - Fixed + Variable
        simple_filepath: data/utility_bills/sdr_rates/State.tsv

    # Outputs to include
    simulation_output_report:
      timeseries_frequency: hourly
      include_timeseries_total_consumptions: true
      include_timeseries_fuel_consumptions: true
      include_timeseries_end_use_consumptions: true
      include_timeseries_emissions: false
      include_timeseries_emission_fuels: false
      include_timeseries_emission_end_uses: false
      include_timeseries_hot_water_uses: true
      include_timeseries_total_loads: true
      include_timeseries_component_loads: false
      include_timeseries_unmet_hours: true
      include_timeseries_zone_temperatures: true
      include_timeseries_zone_conditions: true
      include_timeseries_airflows: false
      include_timeseries_weather: true
      include_timeseries_resilience: false
      output_variables:
        - name: Site Outdoor Air Humidity Ratio

    # Other reporting measures to run
    # reporting_measures:
    #   - measure_dir_name: QOIReport

    # Files to keep
    server_directory_cleanup:
      retain_in_idf: false
      retain_schedules_csv: false
      retain_in_osm: false


### Standard Data Release - Residential -- ###
upgrades:
  ### -- HVAC: Furnaces -- ###
  - upgrade_name: Cala hybrid mode
    options:
      - option: Water Heater Efficiency|Cala Hybrid Mode
        # apply_logic: all

  - upgrade_name: Cala heat pump only mode
    options:
      - option: Water Heater Efficiency|Cala Heat Pump Only Mode
        # apply_logic: all

