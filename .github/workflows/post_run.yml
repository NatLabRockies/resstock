name: ci

on:
  push:
    branches: [ main, develop ]
  pull_request:
    types: [ synchronize, opened ]
  workflow_dispatch:

jobs:
  sdr-diff-comment:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout PR commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.11'

      - name: Generate diff report markdown
        id: diff
        shell: bash
        run: |
          set -e
          git fetch origin develop
          files=$(git diff --name-only origin/develop...HEAD -- 'test/base_results/upgrades/sdr_annual/*.csv')
          if [ -z "$files" ]; then
            echo "No SDR annual CSV changes detected." > diff.txt
          else
            body=""
            for f in $files; do
              echo "Processing $f"
              out=$(uv run .github/scripts/get_diff_report.py "$f")
              body="${body}\n\n${out}"
            done
            echo -e "$body" > diff.txt
          fi

          echo "body<<EOF" >> $GITHUB_OUTPUT
          cat diff.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post (or update) PR comment with diff report
        uses: actions/github-script@v7
        env:
          COMMENT_BODY: ${{ steps.diff.outputs.body }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = '<!-- sdr_diff_report -->';
            const body = process.env.COMMENT_BODY ? `${tag}\n${process.env.COMMENT_BODY}` : `${tag}\n_No SDR annual CSV changes detected._`;
            const prNumber = context.payload.workflow_run.pull_requests[0].number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body.startsWith(tag));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
