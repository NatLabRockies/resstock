name: Post run
on:
  pull_request:
    types: [ synchronize, opened ]
  workflow_dispatch:

concurrency:
  # Cancel in-progress runs when a new workflow with the same concurrency group is queued
  group: ${{ github.workflow }}-${{ github.event.pull_request.number}}
  cancel-in-progress: true

jobs:
  sdr-diff:
    runs-on: ubuntu-latest
    permissions:
        pull-requests: write # This permission is sufficient
        contents: read
        checks: write
    steps:
        - name: Checkout PR commit
          uses: actions/checkout@v4
          with:
            ref: ${{ github.head_ref }}
            fetch-depth: 0
            sparse-checkout: |
              test/
              .github/
              postprocessing/

        - name: Set up Python (UV)
          uses: astral-sh/setup-uv@v6
          with:
            python-version: '3.11'

        - name: Annotate SDR diffs (Checks API)
          env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            PR_NUMBER: ${{ github.event.pull_request.number }}
            REPO: ${{ github.repository }}
            SHA: ${{ github.event.pull_request.head.sha }}
          run: |
            git fetch origin develop
            files=$(git diff --name-only origin/develop...HEAD -- 'test/base_results/upgrades/sdr_annual/*.csv')

            # 1. Create (in-progress) check-run
            check_run_id=$(gh api repos/$REPO/check-runs \
              -F name='SDR diff' \
              -F head_sha="$SHA" \
              -F status='in_progress' --jq '.id')

            # 2. If no files changed -> mark success and exit
            if [ -z "$files" ]; then
              output_json='{"title":"SDR diff","summary":"No SDR annual CSV changes."}'
              gh api repos/$REPO/check-runs/$check_run_id \
                -X PATCH \
                --raw-field conclusion=success \
                --raw-field status=completed \
                --raw-field output="$output_json"
              exit 0
            fi

            # 3. Build annotations JSON array
            annots="[]"
            # Accumulator for full diff text across all files
            all_diffs=""
            for f in $files; do
              echo "--- Processing file: $f ---"
              plain_diff_output=$(uv run .github/scripts/get_diff_report.py "$f")
              markdown_diff_output=$(uv run .github/scripts/get_diff_report.py "$f" --markdown)
              # Append current diff to the accumulator, separated by newlines
              all_diffs+="$markdown_diff_output"
              annots=$(jq --arg path "$f" --arg msg "$plain_diff_output" \
                '. += [{path:$path,start_line:1,end_line:1,annotation_level:"notice",message:$msg}]' <<< "$annots")
            done

            # 4. Complete check-run with annotations (up to 50 per call)
            output_json=$(jq -n --argjson ann "$annots" --arg summary "$all_diffs" '{title:"SDR results diff",summary:$summary,annotations:$ann}')
            cat <<EOF | gh api repos/$REPO/check-runs/$check_run_id -X PATCH --input -
            {
              "conclusion": "success",
              "status": "completed",
              "output": $output_json
            }
            EOF